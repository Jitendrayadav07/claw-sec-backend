<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login with Google</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 480px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    .sub { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
    a.btn {
      display: inline-block;
      padding: 12px 24px;
      background: #4285f4;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      font-weight: 500;
    }
    a.btn:hover { background: #3367d6; }
    .result {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 8px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .result.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .result.error { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
    .result:empty { display: none; }
  </style>
</head>
<body>
  <h1>Login with Google</h1>
  <p class="sub">Click the button below to sign in with Google. You will be redirected to Google and back here.</p>

  <a href="/api/auth/google" class="btn">Login with Google</a>

  <div id="result" class="result"></div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");
      const error = params.get("error");
      const name = params.get("name");
      const email = params.get("email");
      const resultEl = document.getElementById("result");

      if (error) {
        resultEl.textContent = "Error: " + decodeURIComponent(error);
        resultEl.className = "result error";
        return;
      }
      if (token) {
        resultEl.textContent =
          "Logged in successfully.\n\n" +
          "Name: " + (name ? decodeURIComponent(name) : "-") + "\n" +
          "Email: " + (email ? decodeURIComponent(email) : "-") + "\n" +
          "Token: " + decodeURIComponent(token);
        resultEl.className = "result success";
        return;
      }
    })();
  </script>
</body>
</html>
